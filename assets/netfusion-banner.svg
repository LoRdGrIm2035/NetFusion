<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">NetFusion banner</title>
  <desc id="desc">Decorative banner for the NetFusion project showing connected network nodes and product labels.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="45%" stop-color="#0b1f3a"/>
      <stop offset="100%" stop-color="#0f3b66"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#60a5fa" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>

  <g opacity="0.12">
    <circle cx="1160" cy="70" r="140" fill="#38bdf8"/>
    <circle cx="150" cy="300" r="120" fill="#22d3ee"/>
    <circle cx="720" cy="40" r="80" fill="#60a5fa"/>
  </g>

  <g stroke="url(#glow)" stroke-width="3" fill="none" filter="url(#softGlow)">
    <path d="M130 120 L340 120 L470 180 L760 180 L930 110 L1125 110"/>
    <path d="M130 240 L320 240 L470 180 L760 180 L920 250 L1125 250"/>
    <path d="M470 180 L470 110"/>
    <path d="M760 180 L760 260"/>
  </g>

  <g>
    <circle cx="130" cy="120" r="16" fill="#38bdf8"/>
    <circle cx="130" cy="240" r="16" fill="#22d3ee"/>
    <circle cx="340" cy="120" r="14" fill="#60a5fa"/>
    <circle cx="320" cy="240" r="14" fill="#60a5fa"/>
    <circle cx="470" cy="180" r="22" fill="#f8fafc"/>
    <circle cx="760" cy="180" r="22" fill="#f8fafc"/>
    <circle cx="930" cy="110" r="14" fill="#38bdf8"/>
    <circle cx="920" cy="250" r="14" fill="#22d3ee"/>
    <circle cx="1125" cy="110" r="16" fill="#38bdf8"/>
    <circle cx="1125" cy="250" r="16" fill="#22d3ee"/>
    <circle cx="470" cy="110" r="12" fill="#60a5fa"/>
    <circle cx="760" cy="260" r="12" fill="#60a5fa"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="90" y="78" fill="#dbeafe" font-size="16" letter-spacing="3">WINDOWS MULTI-INTERFACE ORCHESTRATION</text>
    <text x="86" y="165" fill="#ffffff" font-size="64" font-weight="700">NetFusion</text>
    <text x="90" y="205" fill="#bfdbfe" font-size="24">Health-aware connection steering for local proxy-based traffic distribution</text>
    <text x="90" y="238" fill="#93c5fd" font-size="18">Proxy decisions, adapter scoring, route safeguards, and live dashboard telemetry</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">
    <rect x="90" y="275" width="150" height="38" rx="19" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.6"/>
    <text x="165" y="300" fill="#e0f2fe" text-anchor="middle">Proxy 8080</text>

    <rect x="255" y="275" width="182" height="38" rx="19" fill="#0f172a" stroke="#60a5fa" stroke-opacity="0.6"/>
    <text x="346" y="300" fill="#dbeafe" text-anchor="middle">Dashboard 9090</text>

    <rect x="452" y="275" width="188" height="38" rx="19" fill="#0f172a" stroke="#22d3ee" stroke-opacity="0.6"/>
    <text x="546" y="300" fill="#ccfbf1" text-anchor="middle">PowerShell Native</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">
    <rect x="874" y="53" width="300" height="52" rx="14" fill="#08101d" stroke="#38bdf8" stroke-opacity="0.45"/>
    <text x="894" y="76" fill="#7dd3fc">Connection-based steering</text>
    <text x="894" y="95" fill="#cbd5e1">Designed for aggregate throughput across many flows</text>

    <rect x="850" y="135" width="324" height="52" rx="14" fill="#08101d" stroke="#60a5fa" stroke-opacity="0.45"/>
    <text x="870" y="158" fill="#93c5fd">Health-aware adapter scoring</text>
    <text x="870" y="177" fill="#cbd5e1">Latency, jitter, failures, and session affinity</text>

    <rect x="874" y="217" width="300" height="52" rx="14" fill="#08101d" stroke="#22d3ee" stroke-opacity="0.45"/>
    <text x="894" y="240" fill="#67e8f9">Local visibility</text>
    <text x="894" y="259" fill="#cbd5e1">Dashboard, decisions, and runtime telemetry files</text>
  </g>
</svg>
